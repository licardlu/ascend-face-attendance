<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考勤记录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/app.css" rel="stylesheet">
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="topbar-inner">
                <div class="d-flex align-items-center gap-3">
                    <div class="brand-mark">AI</div>
                    <div>
                        <p class="brand-title">昇腾人脸考勤系统</p>
                        <p class="brand-subtitle">实时识别与当天考勤记录</p>
                    </div>
                </div>
                <nav class="app-nav">
                    <a href="/" class="nav-link">首页</a>
                    <a href="/users_page" class="nav-link">用户管理</a>
                    <a href="/attendance_page" class="nav-link active">考勤记录</a>
                </nav>
            </div>
        </header>

        <main class="app-main">
            <section class="page-header">
                <div>
                    <div class="eyebrow">REAL-TIME ATTENDANCE</div>
                    <h1 class="page-title">考勤记录</h1>
                    <p class="page-description">设备摄像头持续识别已注册人员，未注册人员只提示不入库；同一用户当天只保留第一次考勤时间。</p>
                </div>
                <div class="status-strip">
                    <span class="status-chip"><span class="status-dot"></span>实时识别</span>
                    <span class="status-chip"><span class="status-dot"></span>北京时间</span>
                </div>
            </section>

            <div class="row g-4">
                <div class="col-lg-7">
                    <section class="panel">
                        <div class="panel-header">
                            <h2 class="panel-title">设备摄像头</h2>
                            <span class="badge text-bg-danger">实时</span>
                        </div>
                        <div class="camera-frame">
                            <div class="camera-toolbar">
                                <span class="status-chip"><span class="status-dot"></span>自动考勤</span>
                                <span class="status-chip">未注册不入库</span>
                            </div>
                            <img src="/video_feed" class="video-stream" alt="摄像头画面" onerror="this.style.display='none'; document.getElementById('cam-error').style.display='block'">
                            <div id="cam-error" class="text-white p-5" style="display:none;">
                                <p class="mb-1">摄像头画面不可用</p>
                                <small>请检查摄像头是否连接到服务器</small>
                            </div>

                            <div id="device-overlay" class="checkin-overlay">
                                <div class="checkin-icon">✓</div>
                                <div class="checkin-text" id="device-checkin-name">用户名</div>
                                <div class="checkin-time" id="device-checkin-time"></div>
                            </div>
                        </div>
                    </section>
                </div>

                <div class="col-lg-5">
                    <section class="panel">
                        <div class="panel-header">
                            <h2 class="panel-title">今日考勤</h2>
                            <button class="btn btn-sm btn-outline-primary" onclick="loadAttendance()">刷新</button>
                        </div>
                        <div class="records-panel">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>时间</th>
                                        <th>用户</th>
                                        <th>抓拍</th>
                                    </tr>
                                </thead>
                                <tbody id="attendanceTableBody">
                                </tbody>
                            </table>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script>
        const attendancePlaceholder = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2260%22 height=%2260%22%3E%3Crect fill=%22%23ddd%22 width=%2260%22 height=%2260%22/%3E%3C/svg%3E';

        function setAttendanceImage(img, imagePath) {
            img.src = imagePath ? `/uploads/${encodeURIComponent(imagePath)}` : attendancePlaceholder;
            img.onerror = () => {
                img.onerror = null;
                img.src = attendancePlaceholder;
            };
        }

        let lastCameraStatusSequence = 0;

        function loadAttendance() {
            fetch('/api/attendance')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('attendanceTableBody');
                    tbody.innerHTML = '';
                    if (data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="3" class="text-center py-4 text-muted">暂无考勤记录</td></tr>';
                        return;
                    }
                    data.forEach(row => {
                        const tr = document.createElement('tr');
                        const timeTd = document.createElement('td');
                        timeTd.textContent = row.timestamp || '';
                        const nameTd = document.createElement('td');
                        nameTd.textContent = row.name || '未知';
                        const imageTd = document.createElement('td');
                        const image = document.createElement('img');
                        image.className = 'record-img';
                        setAttendanceImage(image, row.image_path);
                        imageTd.appendChild(image);
                        tr.append(timeTd, nameTd, imageTd);
                        tbody.appendChild(tr);
                    });
                });
        }

        function pollCameraStatus() {
            fetch('/api/camera/status')
                .then(response => response.json())
                .then(status => {
                    if (!status.sequence || status.sequence === lastCameraStatusSequence) {
                        return;
                    }
                    lastCameraStatusSequence = status.sequence;

                    if (status.status === 'recognized') {
                        showAnimation('device-overlay', status.message, status.time, status.attendance);
                        loadAttendance();
                    } else if (status.status === 'unregistered') {
                        showAnimation('device-overlay', '未注册', status.time, 'unregistered');
                    }
                })
                .catch(err => console.error(err));
        }
        
        function showAnimation(overlayId, message, time, attendanceStatus) {
            const overlay = document.getElementById(overlayId);
            const text = overlay.querySelector('.checkin-text');
            const timeText = document.getElementById('device-checkin-time');
            const icon = overlay.querySelector('.checkin-icon');

            text.innerText = message;
            timeText.innerText = time || '';
            if (attendanceStatus === 'unregistered') {
                overlay.style.background = 'rgba(220, 38, 38, 0.38)';
                icon.innerText = '!';
            } else if (attendanceStatus === 'already_attended') {
                overlay.style.background = 'rgba(37, 99, 235, 0.38)';
                icon.innerText = '✓';
            } else {
                overlay.style.background = 'rgba(22, 163, 74, 0.34)';
                icon.innerText = '✓';
            }
            overlay.style.display = 'flex';
            
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 2000);
        }
        
        setInterval(loadAttendance, 5000);
        setInterval(pollCameraStatus, 1000);

        loadAttendance();
        pollCameraStatus();
    </script>
</body>
</html>
