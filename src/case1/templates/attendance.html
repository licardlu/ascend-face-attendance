<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考勤记录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .camera-box { width: 100%; max-width: 640px; margin: 0 auto; background: #000; min-height: 480px; position: relative; overflow: hidden; border-radius: 8px;}
        video, img.video-stream { width: 100%; height: auto; display: block; }
        canvas { display: none; }
        .status-badge { position: absolute; top: 10px; right: 10px; }
        
        /* Success Animation Overlay */
        .checkin-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(40, 167, 69, 0.3);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            z-index: 10;
        }
        
        .checkin-icon {
            font-size: 5rem;
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .checkin-text {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            animation: fadeInUp 0.5s ease-out;
        }

        .checkin-time {
            font-size: 0.95rem;
            margin-top: 6px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translate3d(0, 20px, 0); }
            to { opacity: 1; transform: translate3d(0, 0, 0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="d-flex justify-content-center py-3">
            <ul class="nav nav-pills">
                <li class="nav-item"><a href="/" class="nav-link">首页</a></li>
                <li class="nav-item"><a href="/users_page" class="nav-link">用户管理</a></li>
                <li class="nav-item"><a href="/attendance_page" class="nav-link active">考勤记录</a></li>
            </ul>
        </header>

        <div class="row">
            <div class="col-md-6">
                <!-- Local Camera (Backend) -->
                <div class="card mb-4">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>设备摄像头（自动打卡）</span>
                        <span class="badge bg-danger">实时</span>
                    </div>
                    <div class="card-body p-0 text-center bg-black position-relative camera-box">
                        <img src="/video_feed" class="video-stream" alt="摄像头画面" onerror="this.style.display='none'; document.getElementById('cam-error').style.display='block'">
                        <div id="cam-error" class="text-white p-5" style="display:none;">
                            <p>摄像头画面不可用</p>
                            <small>请检查摄像头是否连接到服务器</small>
                        </div>

                        <!-- Overlay for Device Camera -->
                        <div id="device-overlay" class="checkin-overlay">
                            <div class="checkin-icon">✅</div>
                            <div class="checkin-text" id="device-checkin-name">用户名</div>
                            <div class="checkin-time" id="device-checkin-time"></div>
                        </div>
                    </div>
                </div>

            </div>

            <div class="col-md-6">
                <h3>考勤记录</h3>
                <button class="btn btn-sm btn-outline-primary mb-2" onclick="loadAttendance()">刷新</button>
                <div style="height: 600px; overflow-y: auto;">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>用户</th>
                                <th>头像</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Upload Checkin
        function uploadCheckin() {
            const fileInput = document.getElementById('uploadImage');
            if(fileInput.files.length === 0) return;
            
            const formData = new FormData();
            formData.append('image', fileInput.files[0]);
            
            fetch('/api/clockin', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success && data.match) {
                    alert(data.message || `打卡成功: ${data.user}`);
                    loadAttendance();
                } else {
                    alert(data.message || '打卡失败或未匹配到用户');
                }
            });
        }

        let lastCameraStatusSequence = 0;

        function loadAttendance() {
            fetch('/api/attendance')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('attendanceTableBody');
                    tbody.innerHTML = '';
                    if (data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="3" class="text-center">暂无考勤记录</td></tr>';
                        return;
                    }
                    data.forEach(row => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${row.timestamp}</td>
                            <td>${row.name || '未知'}</td>
                            <td><img src="/uploads/${row.image_path}" style="width:60px;height:60px;object-fit:cover;" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2260%22 height=%2260%22%3E%3Crect fill=%22%23ddd%22 width=%2260%22 height=%2260%22/%3E%3C/svg%3E'"></td>
                        `;
                        tbody.appendChild(tr);
                    });
                });
        }

        function pollCameraStatus() {
            fetch('/api/camera/status')
                .then(response => response.json())
                .then(status => {
                    if (!status.sequence || status.sequence === lastCameraStatusSequence) {
                        return;
                    }
                    lastCameraStatusSequence = status.sequence;

                    if (status.status === 'recognized') {
                        showAnimation('device-overlay', status.message, status.time, status.attendance);
                        loadAttendance();
                    } else if (status.status === 'unregistered') {
                        showAnimation('device-overlay', '未注册', status.time, 'unregistered');
                    }
                })
                .catch(err => console.error(err));
        }
        
        function showAnimation(overlayId, message, time, attendanceStatus) {
            const overlay = document.getElementById(overlayId);
            const text = overlay.querySelector('.checkin-text');
            const timeText = document.getElementById('device-checkin-time');
            const icon = overlay.querySelector('.checkin-icon');

            text.innerText = message;
            timeText.innerText = time || '';
            if (attendanceStatus === 'unregistered') {
                overlay.style.background = 'rgba(220, 53, 69, 0.35)';
                icon.innerText = '!';
            } else if (attendanceStatus === 'already_attended') {
                overlay.style.background = 'rgba(13, 110, 253, 0.35)';
                icon.innerText = '✓';
            } else {
                overlay.style.background = 'rgba(40, 167, 69, 0.3)';
                icon.innerText = '✓';
            }
            overlay.style.display = 'flex';
            
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 2000);
        }
        
        setInterval(loadAttendance, 5000);
        setInterval(pollCameraStatus, 1000);

        loadAttendance();
        pollCameraStatus();
    </script>
</body>
</html>
