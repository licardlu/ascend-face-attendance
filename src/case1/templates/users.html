<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="d-flex justify-content-center py-3">
            <ul class="nav nav-pills">
                <li class="nav-item"><a href="/" class="nav-link">首页</a></li>
                <li class="nav-item"><a href="/users_page" class="nav-link active">用户管理</a></li>
                <li class="nav-item"><a href="/attendance_page" class="nav-link">考勤记录</a></li>
            </ul>
        </header>

        <div class="row">
            <div class="col-md-4">
                <h3>添加用户</h3>
                <ul class="nav nav-tabs mb-3" id="registerTab" role="tablist">    
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="camera-tab" data-bs-toggle="tab" data-bs-target="#camera" type="button" role="tab">摄像头</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="upload-tab" data-bs-toggle="tab" data-bs-target="#upload" type="button" role="tab">上传照片</button>
                    </li>
                </ul>

                <div class="tab-content" id="registerTabContent">
                    <!-- Upload Tab -->
                    <div class="tab-pane fade show active" id="upload" role="tabpanel">
                        <form id="addUserForm">
                            <div class="mb-3">
                                <label for="userName" class="form-label">姓名</label>
                                <input type="text" class="form-control" id="userName" required>
                            </div>
                            <div class="mb-3">
                                <label for="userImage" class="form-label">人脸照片</label>
                                <input type="file" class="form-control" id="userImage" accept="image/*" required>
                            </div>
                            <button type="submit" class="btn btn-success">添加用户</button>
                        </form>
                    </div>

                    <!-- Camera Tab -->
                    <div class="tab-pane fade" id="camera" role="tabpanel">
                         <form id="addCamUserForm">
                            <div class="mb-3">
                                <label for="camUserName" class="form-label">姓名</label>
                                <input type="text" class="form-control" id="camUserName" required>
                            </div>
                            <div class="mb-3">
                                <div class="btn-group w-100 mb-2" role="group">
                                    <button type="button" class="btn btn-outline-primary active" id="btnDeviceCam" onclick="switchToDevice()">设备摄像头</button>
                                    <button type="button" class="btn btn-outline-primary" id="btnWebCam" onclick="switchToWeb()">浏览器摄像头</button>
                                </div>
                            </div>
                            <div class="mb-3 text-center bg-black" style="min-height: 240px;">
                                <img src="/video_feed" class="img-fluid" id="livePreview" style="max-height: 240px;">
                                <video id="webVideo" autoplay playsinline style="display:none; max-height: 240px; width: 100%;"></video>
                                <canvas id="webCanvas" style="display:none;"></canvas>
                                <img src="" class="img-fluid" id="capturedPreview" style="display:none; max-height: 240px;">
                            </div>
                            <div class="mb-3 d-grid gap-2">
                                <button type="button" class="btn btn-primary" id="btnCapture" onclick="captureFrame()">抓取画面</button>
                                <button type="button" class="btn btn-secondary" id="btnRetake" onclick="retakeFrame()" style="display:none;">重新抓取</button>
                            </div>
                            <input type="hidden" id="tempPath" name="temp_path">
                            <input type="hidden" id="webImageData" name="web_image_data">
                            <button type="submit" class="btn btn-success" id="btnRegisterCam" disabled>添加用户</button>
                        </form>
                    </div>
                </div>

                <div id="addResult" class="mt-3"></div>
            </div>
            <div class="col-md-8">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h3 class="mb-0">已注册用户</h3>
                    <button class="btn btn-danger btn-sm" id="batchDeleteBtn" onclick="deleteSelectedUsers()" disabled>批量删除</button>
                </div>
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th><input class="form-check-input" type="checkbox" id="selectAllUsers" onchange="toggleSelectAll(this)"></th>
                            <th>序号</th>
                            <th>头像</th>
                            <th>姓名</th>
                            <th>注册时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentCameraMode = 'device'; // 默认使用设备摄像头
        let webStream = null;
        const avatarPlaceholder = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2250%22 height=%2250%22%3E%3Ccircle fill=%22%23ddd%22 cx=%2225%22 cy=%2225%22 r=%2225%22/%3E%3C/svg%3E';

        function setAvatarImage(img, avatar) {
            img.src = avatar ? `/uploads/${encodeURIComponent(avatar)}` : avatarPlaceholder;
            img.onerror = () => {
                img.onerror = null;
                img.src = avatarPlaceholder;
            };
        }

        // 初始化浏览器摄像头
        function initWebCamera() {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    webStream = stream;
                    document.getElementById('webVideo').srcObject = stream;
                })
                .catch(err => console.error("浏览器摄像头错误:", err));
        }

        // 切换到设备摄像头
        function switchToDevice() {
            currentCameraMode = 'device';
            document.getElementById('btnDeviceCam').classList.add('active');
            document.getElementById('btnWebCam').classList.remove('active');
            document.getElementById('livePreview').style.display = 'block';
            document.getElementById('webVideo').style.display = 'none';
            if (webStream) {
                webStream.getTracks().forEach(track => track.stop());
            }
        }

        // 切换到浏览器摄像头
        function switchToWeb() {
            currentCameraMode = 'web';
            document.getElementById('btnWebCam').classList.add('active');
            document.getElementById('btnDeviceCam').classList.remove('active');
            document.getElementById('livePreview').style.display = 'none';
            document.getElementById('webVideo').style.display = 'block';
            initWebCamera();
        }
        // Load Users
        function loadUsers() {
            fetch('/api/users?t=' + new Date().getTime())
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('usersTableBody');
                    const selectAll = document.getElementById('selectAllUsers');
                    tbody.innerHTML = '';
                    selectAll.checked = false;
                    selectAll.indeterminate = false;
                    if (data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" class="text-center">暂无用户</td></tr>';
                        updateBatchDeleteButton();
                        return;
                    }
                    data.forEach((user, index) => {
                        const tr = document.createElement('tr');
                        const selectTd = document.createElement('td');
                        const checkbox = document.createElement('input');
                        checkbox.className = 'form-check-input user-checkbox';
                        checkbox.type = 'checkbox';
                        checkbox.value = user.id;
                        checkbox.addEventListener('change', updateBatchDeleteButton);
                        selectTd.appendChild(checkbox);

                        const sequenceTd = document.createElement('td');
                        sequenceTd.textContent = index + 1;

                        const avatarTd = document.createElement('td');
                        const avatarImg = document.createElement('img');
                        avatarImg.style.width = '50px';
                        avatarImg.style.height = '50px';
                        avatarImg.style.objectFit = 'cover';
                        avatarImg.style.borderRadius = '50%';
                        setAvatarImage(avatarImg, user.avatar);
                        avatarTd.appendChild(avatarImg);

                        const nameTd = document.createElement('td');
                        const nameSpan = document.createElement('span');
                        nameSpan.id = `name-${user.id}`;
                        nameSpan.textContent = user.name || '未命名';
                        const editButton = document.createElement('button');
                        editButton.className = 'btn btn-link btn-sm p-0';
                        editButton.type = 'button';
                        editButton.textContent = '编辑';
                        editButton.addEventListener('click', () => editName(user.id, user.name || ''));
                        nameTd.appendChild(nameSpan);
                        nameTd.append(' ');
                        nameTd.appendChild(editButton);

                        const createdTd = document.createElement('td');
                        createdTd.textContent = user.created_at || '';

                        const actionTd = document.createElement('td');
                        const deleteButton = document.createElement('button');
                        deleteButton.className = 'btn btn-danger btn-sm';
                        deleteButton.type = 'button';
                        deleteButton.textContent = '删除';
                        deleteButton.addEventListener('click', () => deleteUser(user.id));
                        actionTd.appendChild(deleteButton);

                        tr.append(selectTd, sequenceTd, avatarTd, nameTd, createdTd, actionTd);
                        tbody.appendChild(tr);
                    });
                    updateBatchDeleteButton();
                })
                .catch(err => console.error(err));
        }

        function getSelectedUserIds() {
            return Array.from(document.querySelectorAll('.user-checkbox:checked'))
                .map(checkbox => Number(checkbox.value));
        }

        function updateBatchDeleteButton() {
            const checkboxes = Array.from(document.querySelectorAll('.user-checkbox'));
            const checkedCount = checkboxes.filter(checkbox => checkbox.checked).length;
            const selectAll = document.getElementById('selectAllUsers');
            document.getElementById('batchDeleteBtn').disabled = checkedCount === 0;
            selectAll.checked = checkboxes.length > 0 && checkedCount === checkboxes.length;
            selectAll.indeterminate = checkedCount > 0 && checkedCount < checkboxes.length;
        }

        function toggleSelectAll(source) {
            document.querySelectorAll('.user-checkbox').forEach(checkbox => {
                checkbox.checked = source.checked;
            });
            updateBatchDeleteButton();
        }

        // Add User (Upload)
        document.getElementById('addUserForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData();
            formData.append('name', document.getElementById('userName').value);
            formData.append('image', document.getElementById('userImage').files[0]);

            registerUser(formData, 'addUserForm');
        });

        // Add User (Camera)
        document.getElementById('addCamUserForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData();
            formData.append('name', document.getElementById('camUserName').value);

            const tempPath = document.getElementById('tempPath').value;
            const webImageData = document.getElementById('webImageData').value;

            if (tempPath) {
                formData.append('temp_path', tempPath);
            } else if (webImageData) {
                formData.append('image_base64', webImageData);
            }

            registerUser(formData, 'addCamUserForm');
        });

        function registerUser(formData, formId) {
             fetch('/api/users', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('用户添加成功！');
                    loadUsers();
                    document.getElementById(formId).reset();
                    if(formId === 'addCamUserForm') retakeFrame();
                } else {
                    alert('错误: ' + data.error);
                }
            });
        }

        // Camera Logic
        function captureFrame() {
            if (currentCameraMode === 'device') {
                fetch('/api/camera/capture', { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if(data.success) {
                        document.getElementById('tempPath').value = data.temp_path;
                        document.getElementById('webImageData').value = '';
                        document.getElementById('livePreview').style.display = 'none';
                        document.getElementById('webVideo').style.display = 'none';
                        const cap = document.getElementById('capturedPreview');
                        cap.style.display = 'block';
                        cap.src = "/uploads/" + data.temp_path;
                        document.getElementById('btnCapture').style.display = 'none';
                        document.getElementById('btnRetake').style.display = 'inline-block';
                        document.getElementById('btnRegisterCam').disabled = false;
                    } else {
                        alert("抓取失败: " + data.error);
                    }
                });
            } else {
                const video = document.getElementById('webVideo');
                const canvas = document.getElementById('webCanvas');
                if (!video.srcObject) {
                    alert("浏览器摄像头不可用");
                    return;
                }
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const dataURL = canvas.toDataURL('image/jpeg');
                document.getElementById('webImageData').value = dataURL;
                document.getElementById('tempPath').value = '';
                document.getElementById('webVideo').style.display = 'none';
                const cap = document.getElementById('capturedPreview');
                cap.style.display = 'block';
                cap.src = dataURL;
                document.getElementById('btnCapture').style.display = 'none';
                document.getElementById('btnRetake').style.display = 'inline-block';
                document.getElementById('btnRegisterCam').disabled = false;
            }
        }

        function retakeFrame() {
            if (currentCameraMode === 'device') {
                document.getElementById('livePreview').style.display = 'block';
            } else {
                document.getElementById('webVideo').style.display = 'block';
            }
            document.getElementById('capturedPreview').style.display = 'none';
            document.getElementById('btnCapture').style.display = 'inline-block';
            document.getElementById('btnRetake').style.display = 'none';
            document.getElementById('btnRegisterCam').disabled = true;
            document.getElementById('tempPath').value = '';
            document.getElementById('webImageData').value = '';
        }

        // Delete User
        function deleteUser(id) {
            if(confirm('确定要删除该用户吗？')) {
                fetch(`/api/users/${id}`, { method: 'DELETE' })
                .then(response => response.json())
                .then(data => {
                    if (data.success) loadUsers();
                });
            }
        }

        function deleteSelectedUsers() {
            const ids = getSelectedUserIds();
            if (ids.length === 0) {
                alert('请选择要删除的用户');
                return;
            }

            if (!confirm(`确定要删除选中的 ${ids.length} 个用户吗？`)) {
                return;
            }

            fetch('/api/users/batch_delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ids})
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    loadUsers();
                } else {
                    alert('错误: ' + data.error);
                }
            });
        }

        // Edit User Name
        function editName(id, currentName) {
            const newName = prompt('请输入新姓名:', currentName);
            if (newName !== null && newName.trim() !== '') {
                fetch(`/api/users/${id}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name: newName.trim()})
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) loadUsers();
                });
            }
        }

        loadUsers();
    </script>
</body>
</html>
